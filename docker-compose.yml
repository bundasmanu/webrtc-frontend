# Dev: build + run with runtime config from docker/local.config.json.example
# (mounted as /usr/share/nginx/html/config.json). Edit that file for WSS / ICE.
#
#   docker compose up --build
#
# Open http://localhost:8080

services:
  webrtc-frontend:
    build: .
    image: webrtc-frontend:local
    ports:
      - "8080:8080"
    volumes:
      - ./docker/local.config.json.example:/usr/share/nginx/html/config.json:ro
